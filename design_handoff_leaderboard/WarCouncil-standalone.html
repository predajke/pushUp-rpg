<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Push UP RPG · Leaderboard (War Council)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1c160f; font-family: Inter, sans-serif; display: grid; place-items: center; }
    #stage { width: 390px; height: 760px; background: #0e0a07; box-shadow: 0 24px 80px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
    .lb-scroll::-webkit-scrollbar { width: 4px; }
    .lb-scroll::-webkit-scrollbar-track { background: #0e0a07; }
    .lb-scroll::-webkit-scrollbar-thumb { background: #2a1f17; border-radius: 2px; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="stage"><div id="root" style="width:100%;height:100%"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="leaderboard.jsx"></script>
  <script type="text/babel" src="variations.jsx"></script>

  <script type="text/babel">
    const VISIBLE_COLS = ['res', 'lvl', 'totalPushUps', 'power', 'armor', 'hp', 'luck', 'age'];
    function App() {
      return <VariationWarCouncil density="comfy" visibleCols={VISIBLE_COLS} />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
